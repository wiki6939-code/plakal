<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>plakal</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.napis {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 60px;
    color: white;
    z-index: 2;
    text-shadow: 2px 2px 10px red;
}
</style>
</head>

<body>

<div class="napis">PLAKAL DLA OLAFa</div>

<video id="vid" autoplay muted playsinline>
    <source src="meme.mp4" type="video/mp4">
</video>

<script>
const v = document.getElementById("vid");

// start
v.play();

// JEDEN klik = od razu dźwięk
document.addEventListener("click", () => {
    v.muted = false;
    v.volume = 1.0;
    v.play();
}, { once: true });
</script>

</body>
</html>
